<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="100%" style="stop-color:#00bbf9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Decorative binary dots in background -->
  <g opacity="0.15" fill="#00f5d4" font-family="monospace" font-size="18">
    <text x="20" y="60">01001</text>
    <text x="380" y="80">10110</text>
    <text x="30" y="440">11010</text>
    <text x="370" y="460">00101</text>
  </g>

  <!-- Center lock body -->
  <rect x="176" y="248" width="160" height="130" rx="16" ry="16" fill="url(#accent)" opacity="0.95"/>

  <!-- Lock shackle -->
  <path d="M 196 248 L 196 200 Q 196 150 256 150 Q 316 150 316 200 L 316 248"
        fill="none" stroke="url(#accent)" stroke-width="22" stroke-linecap="round"/>

  <!-- Keyhole circle -->
  <circle cx="256" cy="302" r="18" fill="#0f0c29"/>
  <!-- Keyhole stem -->
  <rect x="248" y="310" width="16" height="22" rx="4" fill="#0f0c29"/>

  <!-- "B64" text below lock -->
  <text x="256" y="418" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="42" font-weight="bold"
        fill="url(#accent)" filter="url(#glow)">B64</text>

  <!-- Decorative corner bits -->
  <rect x="30" y="30" width="40" height="6" rx="3" fill="#00f5d4" opacity="0.5"/>
  <rect x="30" y="30" width="6" height="40" rx="3" fill="#00f5d4" opacity="0.5"/>
  <rect x="442" y="30" width="40" height="6" rx="3" fill="#00f5d4" opacity="0.5"/>
  <rect x="476" y="30" width="6" height="40" rx="3" fill="#00f5d4" opacity="0.5"/>
  <rect x="30" y="476" width="40" height="6" rx="3" fill="#00f5d4" opacity="0.5"/>
  <rect x="30" y="442" width="6" height="40" rx="3" fill="#00f5d4" opacity="0.5"/>
  <rect x="442" y="476" width="40" height="6" rx="3" fill="#00f5d4" opacity="0.5"/>
  <rect x="476" y="442" width="6" height="40" rx="3" fill="#00f5d4" opacity="0.5"/>
</svg>
