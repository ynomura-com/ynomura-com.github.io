<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f0f4f8">
  <meta name="description" content="Open DroneLog CSVファイルを解析して飛行記録を表示するPWAアプリ">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>DJI 飛行記録 for Open DroneLog CSV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f4f8;
      --bg2: #ffffff;
      --bg3: #e8edf2;
      --surface: #f7f9fc;
      --surface2: #edf1f6;
      --accent: #0055cc;
      --accent2: #0066ff;
      --accent-dim: rgba(0, 85, 204, 0.08);
      --accent-border: rgba(0, 85, 204, 0.25);
      --text: #1a2233;
      --text-muted: #4a5a74;
      --text-faint: #8a99b0;
      --danger: #d63050;
      --success: #0a7a50;
      --warning: #b06010;
      --border: rgba(60, 80, 120, 0.12);
      --border-bright: rgba(60, 80, 120, 0.22);
      --radius: 8px;
      --radius-lg: 14px;
    }    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,85,204,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,85,204,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* Header */
    header {
      padding: 40px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 4px;
      padding: 4px 10px;
      margin-bottom: 16px;
    }

    .header-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 12px;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: var(--radius);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent2);
      color: #fff;
      border-color: var(--accent2);
    }
    .btn-primary:hover {
      background: #0077ff;
      border-color: #0077ff;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 102, 255, 0.35);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border-bright);
    }
    .btn-secondary:hover {
      background: var(--bg2);
      border-color: var(--accent-border);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border-color: rgba(255, 77, 109, 0.3);
    }
    .btn-danger:hover {
      background: rgba(255, 77, 109, 0.1);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0) scale(0.98); }

    .btn svg {
      width: 16px; height: 16px;
      flex-shrink: 0;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
    }

    .stat-chip .label { color: var(--text-muted); }
    .stat-chip .value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
    }

    /* Table */
    .table-wrapper {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .table-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .table-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--text-faint);
      text-transform: uppercase;
    }

    .record-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }

    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: var(--surface); }

    tbody td {
      padding: 13px 16px;
      color: var(--text);
      vertical-align: middle;
    }

    /* Special column styles */
    .col-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .col-drone {
      font-weight: 500;
    }

    .col-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      white-space: nowrap;
    }

    .col-duration {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--success);
    }

    .col-altitude, .col-speed {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
    }

    .col-altitude .unit, .col-speed .unit {
      font-size: 10px;
      color: var(--text-faint);
      margin-left: 2px;
    }

    .col-location {
      color: var(--text-muted);
      font-size: 12px;
      max-width: 220px;
    }

    /* Empty state */
    .empty-state {
      padding: 80px 20px;
      text-align: center;
    }

    .empty-icon {
      width: 64px; height: 64px;
      margin: 0 auto 20px;
      opacity: 0.2;
    }

    .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 13px;
      color: var(--text-faint);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      padding: 12px 20px;
      background: var(--bg2);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1000;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success { border-color: rgba(0, 229, 160, 0.4); }
    .toast.error { border-color: rgba(255, 77, 109, 0.4); }
    .toast.success svg { color: var(--success); }
    .toast.error svg { color: var(--danger); }

    /* Loading overlay */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(240, 244, 248, 0.88);
      z-index: 500;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .loading-overlay.active { display: flex; }

    .loading-spinner {
      width: 40px; height: 40px;
      border: 2px solid var(--border-bright);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 13px;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    /* Hidden file input */
    #file-input { display: none; }

    /* PWA install prompt */
    .install-banner {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-size: 13px;
    }

    .install-banner.visible { display: flex; }

    @media (max-width: 600px) {
      header { padding: 24px 0 20px; }
      .controls { gap: 8px; }
      .btn { padding: 9px 16px; font-size: 13px; }
      .stats-bar { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-badge">PWA · DRONE ANALYZER</div>
      <h1>ドローンログ解析<br><span>for Open DroneLog CSV</span></h1>
      <p class="subtitle">Open DroneLog でエクスポートした CSV ファイルを選択してください</p>
    </header>

    <div class="install-banner" id="install-banner">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span>このアプリをホーム画面に追加できます</span>
      <button class="btn btn-secondary" id="install-btn" style="margin-left: auto; padding: 6px 14px; font-size: 12px;">インストール</button>
      <button onclick="document.getElementById('install-banner').classList.remove('visible')" style="background:none;border:none;cursor:pointer;color:var(--text-muted);">✕</button>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="btn-open">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
          <path d="M12 12v4m0 0l-2-2m2 2l2-2"/>
        </svg>
        ファイルを選択
      </button>
      <button class="btn btn-secondary" id="btn-copy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        TSV としてコピー
      </button>
      <button class="btn btn-danger" id="btn-clear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6m4-6v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
        </svg>
        内容をクリア
      </button>
    </div>

    <div class="stats-bar" id="stats-bar" style="display:none;">
      <div class="stat-chip">
        <span class="label">フライト数</span>
        <span class="value" id="stat-count">0</span>
      </div>
      <div class="stat-chip">
        <span class="label">総飛行時間</span>
        <span class="value" id="stat-total-time">0分</span>
      </div>
      <div class="stat-chip">
        <span class="label">最大高度</span>
        <span class="value" id="stat-max-alt">0m</span>
      </div>
      <div class="stat-chip">
        <span class="label">最高速度</span>
        <span class="value" id="stat-max-speed">0km/h</span>
      </div>
    </div>

    <div class="table-wrapper">
      <div class="table-header-row">
        <span class="table-title">FLIGHT RECORDS</span>
        <span class="record-count" id="record-count">0 件</span>
      </div>
      <div class="table-scroll">
        <table id="flight-table">
          <thead>
            <tr>
              <th>日付</th>
              <th>ドローン名</th>
              <th>離陸時刻</th>
              <th>着陸時刻</th>
              <th>飛行時間</th>
              <th>最大高度</th>
              <th>最大速度</th>
              <th>離着陸場所</th>
            </tr>
          </thead>
          <tbody id="table-body">
          </tbody>
        </table>
        <div class="empty-state" id="empty-state">
          <svg class="empty-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M32 8L8 22v20l24 14 24-14V22L32 8z"/>
            <circle cx="32" cy="32" r="6"/>
            <path d="M32 8v18M8 22l18 10M56 22L38 32M8 42l18-10M56 42L38 32"/>
          </svg>
          <p class="empty-title">フライトデータなし</p>
          <p class="empty-desc">「ファイルを選択」から Open DroneLog の CSV ファイルを読み込んでください</p>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" accept=".csv">

  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <p class="loading-text">解析中...</p>
  </div>

  <div class="toast" id="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="toast-icon"></svg>
    <span id="toast-msg"></span>
  </div>

  <script>
    // ==============================
    // State
    // ==============================
    let flightData = [];

    // ==============================
    // UI Helpers
    // ==============================
    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      document.getElementById('toast-msg').textContent = msg;
      toast.className = 'toast ' + type;
      icon.innerHTML = type === 'success'
        ? '<polyline points="20 6 9 17 4 12"/>'
        : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function setLoading(on) {
      document.getElementById('loading').classList.toggle('active', on);
    }

    function updateStats() {
      const bar = document.getElementById('stats-bar');
      if (flightData.length === 0) { bar.style.display = 'none'; return; }
      bar.style.display = 'flex';
      document.getElementById('stat-count').textContent = flightData.length;
      const totalSecs = flightData.reduce((s, r) => s + (r._durationSecs || 0), 0);
      const tm = Math.floor(totalSecs / 60);
      const ts = totalSecs % 60;
      document.getElementById('stat-total-time').textContent = ts > 0 ? `${tm}分${ts}秒` : `${tm}分`;
      const maxAlt = Math.max(...flightData.map(r => parseFloat(r.maxAlt) || 0));
      document.getElementById('stat-max-alt').textContent = maxAlt > 0 ? maxAlt + 'm' : 'N/A';
      const maxSpd = Math.max(...flightData.map(r => parseFloat(r.maxSpeed) || 0));
      document.getElementById('stat-max-speed').textContent = maxSpd > 0 ? maxSpd + 'km/h' : 'N/A';
    }

    // ==============================
    // CSV Parsing (single-pass, RFC 4180 compliant)
    // ==============================
    function parseCSV(text) {
      const src = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      const rows = [];
      let row = [], field = '', inQ = false;
      const n = src.length;
      for (let i = 0; i <= n; i++) {
        const c = i < n ? src[i] : null;
        if (inQ) {
          if (c === '"') {
            if (i + 1 < n && src[i + 1] === '"') { field += '"'; i++; }
            else inQ = false;
          } else if (c === null) {
            row.push(field);
          } else {
            field += c;
          }
        } else {
          if (c === '"') {
            inQ = true;
          } else if (c === ',') {
            row.push(field); field = '';
          } else if (c === '\n' || c === null) {
            row.push(field); field = '';
            if (row.some(f => f !== '')) rows.push(row);
            row = [];
          } else {
            field += c;
          }
        }
      }
      return rows;
    }


    // ==============================
    // Date / Time Helpers
    // ==============================
    function parseGMTtoJST(str) {
      if (!str) return null;
      // "2026-06-02 01:21:11.294+00" or "2026-06-02T01:21:11.294+00:00"
      const s = str.replace(' ', 'T').replace(/\+00$/, '+00:00').replace(/\+00:00$/, 'Z');
      const d = new Date(s);
      if (isNaN(d)) return null;
      return d;
    }

    function formatDate(d) {
      if (!d) return '-';
      return d.toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    function formatTime(d) {
      if (!d) return '-';
      return d.toLocaleTimeString('ja-JP', { timeZone: 'Asia/Tokyo', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function formatDuration(secs) {
      if (secs == null || isNaN(secs)) return '-';
      const m = Math.floor(secs / 60);
      const s = Math.round(secs % 60);
      return s > 0 ? `${m}分${s}秒` : `${m}分`;
    }

    function addSeconds(d, secs) {
      if (!d || secs == null) return null;
      return new Date(d.getTime() + secs * 1000);
    }

    // ==============================
    // Reverse Geocoding
    // ==============================
    async function reverseGeocode(lat, lon) {
      if (!lat || !lon) return '不明';
      try {
        const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=ja`;
        const res = await fetch(url, { headers: { 'User-Agent': 'DroneLogAnalyzer/1.0' } });
        if (!res.ok) return `${lat}, ${lon}`;
        const data = await res.json();
        if (data.display_name) {
          // Shorten: remove country, zip code parts
          const addr = data.address || {};
          const parts = [
            addr.state || addr.prefecture,
            addr.city || addr.town || addr.village || addr.county,
            addr.suburb || addr.neighbourhood || addr.quarter,
            addr.road
          ].filter(Boolean);
          return parts.length > 0 ? parts.join(' ') : data.display_name.split(',').slice(0, 4).join(',');
        }
        return `${lat}, ${lon}`;
      } catch {
        return `${lat}, ${lon}`;
      }
    }

    // ==============================
    // Table Rendering
    // ==============================
    function renderTable() {
      const tbody = document.getElementById('table-body');
      const empty = document.getElementById('empty-state');
      document.getElementById('record-count').textContent = flightData.length + ' 件';

      if (flightData.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        updateStats();
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = flightData.map(r => `
        <tr>
          <td class="col-date">${r.date || '-'}</td>
          <td class="col-drone">${r.droneName || '-'}</td>
          <td class="col-time">${r.takeoffTime || '-'}</td>
          <td class="col-time">${r.landingTime || '-'}</td>
          <td class="col-duration">${r.duration || '-'}</td>
          <td class="col-altitude">${r.maxAlt != null ? r.maxAlt : '-'}<span class="unit">${r.maxAlt != null ? 'm' : ''}</span></td>
          <td class="col-speed">${r.maxSpeed != null ? r.maxSpeed : '-'}<span class="unit">${r.maxSpeed != null ? 'km/h' : ''}</span></td>
          <td class="col-location">${r.location || '<span style="color:var(--text-faint)">取得中...</span>'}</td>
        </tr>
      `).join('');
      updateStats();
    }

    // ==============================
    // File Processing
    // ==============================
    async function processCSV(text) {
      setLoading(true);
      try {
        const rows = parseCSV(text);
        if (rows.length < 2) throw new Error('データ行が見つかりません');

        const headers = rows[0];
        const metaIdx = headers.findIndex(h => h.trim().toLowerCase() === 'metadata');

        if (metaIdx < 0) throw new Error('"metadata" 列が見つかりません');

        const newRecords = [];

        // Open DroneLog CSV: metadata is only in the FIRST data row (row index 1).
        // Subsequent rows are telemetry samples with empty metadata cell.
        // We collect all rows that have a non-empty metadata cell (supports
        // both single-flight files and multi-flight concatenated exports).
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          const rawMeta = row[metaIdx];
          if (!rawMeta || !rawMeta.trim()) continue;

          let meta;
          try {
            meta = JSON.parse(rawMeta);
          } catch {
            continue;
          }

          const droneName = meta.aircraft_name || meta.drone_name || meta.aircraft || '-';
          const startGMT = parseGMTtoJST(meta.start_time);
          const durationSecs = parseFloat(meta.duration_secs) || 0;
          const landingDate = addSeconds(startGMT, durationSecs);

          // max_altitude_m (Open DroneLog v3) → fallback to max_altitude / maxAltitude
          const altRaw = meta.max_altitude_m != null ? meta.max_altitude_m
                       : meta.max_altitude   != null ? meta.max_altitude
                       : meta.maxAltitude    != null ? meta.maxAltitude
                       : meta.altitude_max   != null ? meta.altitude_max
                       : null;
          const maxAlt = altRaw != null ? parseFloat(altRaw).toFixed(1) : null;

          // max_speed_ms is m/s → convert to km/h
          // fallback to max_speed (assumed km/h if field name has no _ms suffix)
          let maxSpeed = null;
          if (meta.max_speed_ms != null) {
            maxSpeed = (parseFloat(meta.max_speed_ms) * 3.6).toFixed(1);
          } else if (meta.max_speed != null) {
            maxSpeed = parseFloat(meta.max_speed).toFixed(1);
          } else if (meta.maxSpeed != null) {
            maxSpeed = parseFloat(meta.maxSpeed).toFixed(1);
          }

          const homeLat = meta.home_lat || meta.takeoff_lat || meta.start_lat;
          const homeLon = meta.home_lon || meta.takeoff_lon || meta.start_lon;

          const record = {
            date: formatDate(startGMT),
            droneName,
            takeoffTime: formatTime(startGMT),
            landingTime: formatTime(landingDate),
            duration: formatDuration(durationSecs),
            _durationSecs: durationSecs,
            maxAlt,
            maxSpeed,
            location: null,
            _lat: homeLat,
            _lon: homeLon,
          };

          newRecords.push(record);
        }

        if (newRecords.length === 0) throw new Error('有効なフライト記録が見つかりませんでした');

        // Merge with existing
        flightData = [...flightData, ...newRecords];
        renderTable();
        showToast(`${newRecords.length} 件のフライト記録を読み込みました`);

        // Geocode asynchronously
        for (let i = flightData.length - newRecords.length; i < flightData.length; i++) {
          const r = flightData[i];
          r.location = await reverseGeocode(r._lat, r._lon);
          renderTable();
        }

      } catch (e) {
        showToast('エラー: ' + e.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    // ==============================
    // Event Listeners
    // ==============================
    document.getElementById('btn-open').addEventListener('click', () => {
      document.getElementById('file-input').value = '';
      document.getElementById('file-input').click();
    });

    document.getElementById('file-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => processCSV(ev.target.result);
      reader.readAsText(file, 'UTF-8');
    });

    document.getElementById('btn-copy').addEventListener('click', () => {
      if (flightData.length === 0) { showToast('コピーするデータがありません', 'error'); return; }
      const headers = ['日付', 'ドローン名', '離陸時刻', '着陸時刻', '飛行時間', '最大高度(m)', '最大速度(km/h)', '離着陸場所'];
      const rows = flightData.map(r => [
        r.date, r.droneName, r.takeoffTime, r.landingTime,
        r.duration, r.maxAlt ?? '', r.maxSpeed ?? '', r.location || ''
      ]);
      const tsv = [headers, ...rows].map(r => r.join('\t')).join('\n');
      navigator.clipboard.writeText(tsv)
        .then(() => showToast('TSV をクリップボードにコピーしました'))
        .catch(() => showToast('コピーに失敗しました', 'error'));
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      if (flightData.length === 0) return;
      flightData = [];
      renderTable();
      showToast('クリアしました');
    });

    // ==============================
    // PWA Install
    // ==============================
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').classList.add('visible');
    });

    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        document.getElementById('install-banner').classList.remove('visible');
      }
      deferredPrompt = null;
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Initial render
    renderTable();
  </script>
</body>
</html>
