<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2196F3">
    <meta name="description" content="DJI Flight Log Analyzer - DJI Flight Log Viewer CSV形式のフライトログを解析">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon512.png">
    <!-- iOS用 -->
    <link rel="apple-touch-icon" href="icon512.png">
    <title>DJI飛行ログ解析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }

        input[type="file"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }

        .button-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #1976D2;
        }

        button:active {
            transform: scale(0.98);
        }

        .clear-btn {
            background: #f44336;
        }

        .clear-btn:hover {
            background: #da190b;
        }

        .copy-btn {
            background: #4CAF50;
        }

        .copy-btn:hover {
            background: #45a049;
        }

        .install-btn {
            background: #FF9800;
        }

        .install-btn:hover {
            background: #E68900;
        }

        .results-section {
            margin-top: 30px;
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .result-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 4px;
            border-left: 4px solid #2196F3;
        }

        .result-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            font-family: monospace;
            word-break: break-all;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 13px;
        }

        .data-table thead {
            background: #f0f0f0;
        }

        .data-table th {
            padding: 12px;
            text-align: left;
            font-weight: bold;
            border-bottom: 2px solid #ddd;
        }

        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            font-family: monospace;
        }

        .data-table tbody tr:hover {
            background: #f9f9f9;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .success.show {
            display: block;
        }

        .loading {
            color: #666;
            font-style: italic;
            display: none;
            margin: 20px 0;
        }

        .loading.show {
            display: block;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        .install-prompt {
            background: #e3f2fd;
            border: 1px solid #2196F3;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .install-prompt.show {
            display: block;
        }

        .install-prompt p {
            margin-bottom: 10px;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚁 DJI Flight Log Analyzer</h1>
        <p class="subtitle">DJI Flight Log Viewer (PhantomHelp) CSV形式のフライトログを解析します</p>

        <div class="install-prompt" id="installPrompt">
            <p>💡 このアプリをホーム画面に追加できます</p>
            <button class="install-btn" onclick="installApp()">インストール</button>
        </div>

        <div>
            DJI Fly から取り出した .txt ファイルを <a href="https://www.phantomhelp.com/logviewer/upload/" target="_blank">DJI Flight Log Viewer</a>
            にアップロードして .csv 形式でダウンロードしたファイルを選択して読み込ませてください。
        </div>

        <div class="upload-section">
            <label class="upload-label">CSVファイルを選択:</label>
            <input type="file" id="csvFile" accept=".csv">
            <div class="button-group">
                <button onclick="analyzeFile()">📊 解析</button>
                <button class="copy-btn" onclick="copyToClipboard()" id="copyBtn" style="display:none;">📋 TSVをコピー</button>
                <button class="clear-btn" onclick="clearAll()">🔄 クリア</button>
            </div>
        </div>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
        <div class="loading" id="loading">解析中...</div>

        <div class="results-section" id="results">
            <div class="result-grid" id="resultGrid"></div>

            <h3>飛行データ詳細（最初の100行）</h3>
            <div class="table-container">
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>時刻</th>
                            <th>飛行時間</th>
                            <th>飛行時間 (s)</th>
                            <th>高度 (ft)</th>
                            <th>速度 (MPH)</th>
                            <th>バッテリー (%)</th>
                            <th>状態</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody"></tbody>
                </table>
            </div>

            <div class="button-group" style="margin-top: 20px;">
                <button onclick="exportCSV()">📥 CSVでエクスポート</button>
            </div>
        </div>
    </div>

    <script>
        let flightData = null;
        let deferredPrompt = null;

        // Service Worker登録
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('Service Worker登録エラー:', err);
            });
        }

        // インストール可能イベント
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installPrompt').classList.add('show');
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('ユーザーがインストールを承認');
                    }
                    deferredPrompt = null;
                    document.getElementById('installPrompt').classList.remove('show');
                });
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            if (current) result.push(current.trim());
            return result;
        }

        function parseTime(timeStr) {
            try {
                const parts = timeStr.split(' ');
                const timePart = parts[0];
                const ampm = parts[1];
                const timeBits = timePart.split(':');
                let hours = parseInt(timeBits[0]);
                const minutes = parseInt(timeBits[1]);
                const seconds = parseInt(timeBits[2]);

                if (ampm === 'PM' && hours !== 12) hours += 12;
                if (ampm === 'AM' && hours === 12) hours = 0;

                const date = new Date();
                date.setHours(hours, minutes, seconds);
                return date;
            } catch (e) {
                return null;
            }
        }

        function convertToJST(date) {
            if (!date) return null;
            // GMTからJST(UTC+9)に変換
            return new Date(date.getTime() + 9 * 60 * 60 * 1000);
        }

        function analyzeFile() {
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];

            if (!file) {
                showError('ファイルを選択してください');
                return;
            }

            showLoading(true);
            const reader = new FileReader();

            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    let lines = content.split('\n').map(line => line.trim().replace(/\r/g, '')).filter(line => line);

                    // sep=, という行をスキップ
                    if (lines[0] === 'sep=,') {
                        lines = lines.slice(1);
                    }

                    if (lines.length < 2) {
                        throw new Error('ファイルが空です');
                    }

                    const headers = parseCSVLine(lines[0]);
                    const headerMap = {};
                    headers.forEach((h, i) => {
                        headerMap[h.trim()] = i;
                    });

                    flightData = {
                        takeoffTime: null,
                        landingTime: null,
                        flightDuration: 0,
                        maxAltitude: 0,
                        maxSpeed: 0,
                        droneModel: null,
                        dataPoints: []
                    };

                    let maxAlt = -Infinity;
                    let maxSpd = 0;
                    let lastFlyTime = null;
                    let isFlying = false;

                    for (let i = 1; i < lines.length; i++) {
                        const values = parseCSVLine(lines[i]);
                        const row = {};
                        headers.forEach((h, idx) => {
                            row[h.trim()] = values[idx] || '';
                        });

                        const timeStr = row['CUSTOM.updateTime [local]'];
                        if (!timeStr) continue;

                        const flyTimeStr = row['OSD.flyTime [s]'];
                        const flyTime = flyTimeStr ? parseFloat(flyTimeStr) : 0;
                        const flycState = row['OSD.flycState'];

                        const currentIsFlying = flyTime > 0 && flycState && !flycState.includes('Other') && !flycState.includes('Idle');

                        if (currentIsFlying && !isFlying) {
                            isFlying = true;
                            flightData.takeoffTime = convertToJST(parseTime(timeStr));
                        }

                        if (!currentIsFlying && isFlying && lastFlyTime !== null) {
                            isFlying = false;
                            flightData.landingTime = convertToJST(parseTime(timeStr));
                        }

                        if (currentIsFlying) {
                            lastFlyTime = flyTime;
                        }

                        const alt = parseFloat(row['OSD.height [ft]']) || 0;
                        const spd = parseFloat(row['OSD.hSpeed [MPH]']) || 0;
                        const bat = parseFloat(row['BATTERY.chargeLevel']) || 0;

                        if (alt > 0) maxAlt = Math.max(maxAlt, alt);
                        if (spd > 0) maxSpd = Math.max(maxSpd, spd);

                        if (!flightData.droneModel) {
                            flightData.droneModel = row['OSD.droneType'] || 'Unknown';
                        }

                        flightData.dataPoints.push({
                            time: timeStr,
                            flyTimeStr: row['OSD.flyTime'],
                            flyTime: flyTime,
                            alt: alt,
                            spd: spd,
                            bat: bat,
                            state: flycState
                        });
                    }

                    if (flightData.takeoffTime && flightData.landingTime) {
                        flightData.flightDuration = Math.floor(
                            (flightData.landingTime.getTime() - flightData.takeoffTime.getTime()) / 1000
                        );
                    } else if (lastFlyTime !== null) {
                        flightData.flightDuration = Math.floor(lastFlyTime);
                        if (flightData.takeoffTime) {
                            flightData.landingTime = new Date(flightData.takeoffTime.getTime() + flightData.flightDuration * 1000);
                        }
                    }

                    if (maxAlt !== -Infinity) {
                        flightData.maxAltitude = Math.round(maxAlt);
                    }
                    flightData.maxSpeed = Math.round(maxSpd * 10) / 10;

                    displayResults();
                    showLoading(false);
                    document.getElementById('copyBtn').style.display = 'inline-block';
                } catch (error) {
                    showError('エラー: ' + error.message);
                    showLoading(false);
                }
            };

            reader.readAsText(file);
        }

        function displayResults() {
            const resultGrid = document.getElementById('resultGrid');
            resultGrid.innerHTML = '';

            const results = [
                { label: '離陸時刻', value: flightData.takeoffTime ? flightData.takeoffTime.toLocaleTimeString('ja-JP') : '-' },
                { label: '着陸時刻', value: flightData.landingTime ? flightData.landingTime.toLocaleTimeString('ja-JP') : '-' },
                { label: '飛行時間', value: flightData.flightDuration ? `${Math.floor(flightData.flightDuration / 60)}分 ${flightData.flightDuration % 60}秒` : '-' },
                { label: '最大高度', value: flightData.maxAltitude ? `${flightData.maxAltitude} ft` : '-' },
                { label: '最大速度', value: flightData.maxSpeed ? `${flightData.maxSpeed} MPH` : '-' },
                { label: 'ドローン', value: flightData.droneModel },
                { label: 'データポイント', value: flightData.dataPoints.length }
            ];

            results.forEach(r => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `<div class="result-label">${r.label}</div><div class="result-value">${r.value}</div>`;
                resultGrid.appendChild(card);
            });

            const dataBody = document.getElementById('dataBody');
            dataBody.innerHTML = '';

            flightData.dataPoints.slice(0, 100).forEach(point => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${point.time}</td>
                    <td>${point.flyTimeStr}</td>
                    <td>${point.flyTime.toFixed(1)}</td>
                    <td>${point.alt ? point.alt.toFixed(1) : '-'}</td>
                    <td>${point.spd ? point.spd.toFixed(1) : '-'}</td>
                    <td>${point.bat ? point.bat.toFixed(0) : '-'}</td>
                    <td>${point.state}</td>
                `;
                dataBody.appendChild(row);
            });

            document.getElementById('results').classList.add('show');
            document.getElementById('errorMsg').classList.remove('show');
        }

        function copyToClipboard() {
            if (!flightData) return;

            // 離陸時刻を分単位に切り捨て
            let takeoffTimeFormatted = '-';
            let landingTimeFormatted = '-';
            let flightTimeFormatted = '-';
            
            if (flightData.takeoffTime) {
                const h = String(flightData.takeoffTime.getHours()).padStart(2, '0');
                const m = String(flightData.takeoffTime.getMinutes()).padStart(2, '0');
                takeoffTimeFormatted = `${h}:${m}`;
                
                // 飛行時間を秒を切り上げて分単位に変換
                const flightTimeMinutes = Math.ceil(flightData.flightDuration / 60);
                flightTimeFormatted = `${String(flightTimeMinutes).padStart(2, '0')}`;
                
                // 離陸時刻（分単位）+ 飛行時間（分）で着陸時刻を再計算
                const takeoffMinutes = flightData.takeoffTime.getHours() * 60 + flightData.takeoffTime.getMinutes();
                const landingMinutes = takeoffMinutes + flightTimeMinutes;
                const landingHours = Math.floor(landingMinutes / 60) % 24;
                const landingMins = landingMinutes % 60;
                const lh = String(landingHours).padStart(2, '0');
                const lm = String(landingMins).padStart(2, '0');
                landingTimeFormatted = `${lh}:${lm}`;
            } else {
                const flightTimeMinutes = flightData.flightDuration ? Math.ceil(flightData.flightDuration / 60) : 0;
                flightTimeFormatted = flightTimeMinutes ? `${String(flightTimeMinutes).padStart(2, '0')}` : '-';
            }
            
            const maxAltitude = flightData.maxAltitude ? `${Math.ceil(flightData.maxAltitude * 0.3048)}` : '-';
            const maxSpeed = flightData.maxSpeed ? `${Math.ceil(flightData.maxSpeed * 1.609)}` : '-';
            const droneModel = flightData.droneModel;
            const dataPoints = flightData.dataPoints.length;
            // ファイル名から日付を取り出して整形
            const dataDate = document.getElementById('csvFile').value.split('_')[1].replaceAll('-','/');

            const header = '日付\t離陸時刻\t着陸時刻\t飛行時間(分)\t最大高度(m)\t最大速度(Km/h)\tドローン名称\tデータポイント';
            const data = `${dataDate}\t${takeoffTimeFormatted}\t${landingTimeFormatted}\t${flightTimeFormatted}\t${maxAltitude}\t${maxSpeed}\t${droneModel}\t${dataPoints}`;
            const tsv = `${header}\n${data}`;

            navigator.clipboard.writeText(tsv).then(() => {
                showSuccess('TSVをクリップボードにコピーしました');
            }).catch(err => {
                showError('コピーに失敗しました: ' + err.message);
            });
        }

        function exportCSV() {
            if (!flightData) return;

            let csv = 'Time,Fly Time,Fly Time (s),Altitude (ft),Speed (MPH),Battery (%),State\n';
            flightData.dataPoints.forEach(p => {
                csv += `${p.time},${p.flyTimeStr},${p.flyTime},${p.alt},${p.spd},${p.bat},${p.state}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'flight_log_export.csv';
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function showSuccess(msg) {
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = msg;
            successDiv.classList.add('show');
            setTimeout(() => successDiv.classList.remove('show'), 3000);
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function clearAll() {
            document.getElementById('csvFile').value = '';
            document.getElementById('results').classList.remove('show');
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('copyBtn').style.display = 'none';
            flightData = null;
        }
    </script>
</body>
</html>
